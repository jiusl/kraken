# SearXNG configuration
# 针对中国大陆服务器优化：优先使用国内可访问的搜索引擎
use_default_settings: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

# 只启用国内可直接访问的引擎，避免返回大量被墙 URL
# 中文搜索优化：Brave / Startpage / Qwant 对中文支持较好
engines:
  # ---- 中文搜索引擎 ----
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false
  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
  - name: mwmbl
    engine: mwmbl
    shortcut: mw
    disabled: false

  # ---- 图片/新闻等默认关闭 ----
  - name: bing images
    engine: bing_images
    shortcut: bii
    disabled: true
  - name: bing news
    engine: bing_news
    shortcut: bin
    disabled: true
  - name: bing videos
    engine: bing_videos
    shortcut: biv
    disabled: true

  # ---- 禁用：返回大量被墙结果的引擎 ----
  - name: google
    disabled: true
  - name: wikipedia
    disabled: true
  - name: yahoo
    disabled: true
  - name: yacy
    disabled: true

server:
  secret_key: "kraken-dev-searxng-secret-key-2024"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true

redis:
  url: false
