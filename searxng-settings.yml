# SearXNG 配置 — 中国大陆优化版
# 使用默认设置保底，引擎选择由搜索请求参数控制
use_default_settings: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

outgoing:
  request_timeout: 5.0
  max_request_timeout: 8.0

server:
  secret_key: "kraken-searxng-secret-key-change-me"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true

redis:
  url: false
