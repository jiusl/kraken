# SearXNG 配置 — 中国大陆优化版
# use_default_settings: true 加载内置默认，下面只覆盖需要的引擎
use_default_settings: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

# 只启用 Bing（走 cn.bing.com），其余引擎全部禁用
engines:
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
  - name: bing images
    disabled: true
  - name: bing news
    disabled: true
  - name: bing videos
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: brave
    disabled: true
  - name: startpage
    disabled: true
  - name: qwant
    disabled: true
  - name: mwmbl
    disabled: true
  - name: google
    disabled: true
  - name: google images
    disabled: true
  - name: google news
    disabled: true
  - name: google videos
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: yahoo
    disabled: true
  - name: yacy
    disabled: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0

server:
  secret_key: "kraken-searxng-secret-key-change-me"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true

redis:
  url: false
