# SearXNG configuration
# 针对中国大陆服务器优化：优先使用国内可访问的搜索引擎
use_default_settings: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

# 覆盖特定引擎设置（其余使用 SearXNG 内置默认）
engines:
  # 禁用被墙 / 不可用的引擎
  - name: google
    disabled: true
  - name: google images
    disabled: true
  - name: google news
    disabled: true
  - name: google videos
    disabled: true
  - name: wikipedia
    disabled: true
  - name: yahoo
    disabled: true
  - name: yacy
    disabled: true
  - name: bing images
    disabled: true
  - name: bing news
    disabled: true
  - name: bing videos
    disabled: true

outgoing:
  request_timeout: 15.0
  max_request_timeout: 20.0

server:
  secret_key: "kraken-dev-searxng-secret-key-2024"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true

redis:
  url: false
